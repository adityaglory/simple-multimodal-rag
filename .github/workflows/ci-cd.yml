name: Multimodal RAG CI/CD Pipeline

# 1. When should this run? Every time you push to the 'main' branch!
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 2. What jobs should it do?
jobs:
  # JOB 1: Run our automated tests
  test-python-code:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest

    - name: Run Pytest
      run: |
        pytest tests/

  # JOB 2: If tests pass, make sure Docker can build the container
  test-docker-build:
    needs: test-python-code # This ensures Docker only builds IF the tests pass!
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Test Docker Build
      run: |
        docker build -t mmrag-ui:test .